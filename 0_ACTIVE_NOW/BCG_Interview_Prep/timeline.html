<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>BCG Schedule Timeline</title>
    <style>
      :root {
        --bcg-green: #00a651;
        --text: #1a1a1a;
        --text-muted: #888;
        --bg: #0f0f0f;
        --card-bg: #1a1a1a;
        --highlight: #e8a500;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "SF Pro Display",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--bg);
        color: #e0e0e0;
        min-height: 100vh;
        overflow: hidden;
      }

      /* ═══ TOP BAR ═══ */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 56px;
        background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
        border-bottom: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        z-index: 100;
      }
      .topbar h1 {
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 1.5px;
      }
      .topbar h1 span {
        color: var(--bcg-green);
      }
      .topbar .countdown {
        font-size: 12px;
        color: var(--bcg-green);
        font-weight: 600;
        background: rgba(0, 166, 81, 0.1);
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid rgba(0, 166, 81, 0.25);
      }
      .topbar .now-label {
        font-size: 13px;
        color: #fff;
        font-weight: 600;
      }

      /* ═══ DAY TABS ═══ */
      .day-tabs {
        position: fixed;
        top: 56px;
        left: 0;
        right: 0;
        height: 48px;
        background: #161616;
        border-bottom: 1px solid #2a2a2a;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 24px;
        z-index: 99;
      }
      .day-tab {
        padding: 8px 18px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        background: transparent;
        color: #777;
        border: 1px solid transparent;
        transition: all 0.15s;
        letter-spacing: 0.5px;
      }
      .day-tab:hover {
        color: #bbb;
        background: #222;
      }
      .day-tab.active {
        background: var(--bcg-green);
        color: #fff;
        border-color: var(--bcg-green);
      }
      .day-tab.today::after {
        content: "●";
        margin-left: 5px;
        font-size: 8px;
        color: var(--highlight);
      }
      .day-tab.skipped {
        opacity: 0.35;
        text-decoration: line-through;
        pointer-events: none;
      }

      /* ═══ MAIN TIMELINE AREA ═══ */
      .timeline-container {
        position: fixed;
        top: 104px;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        overflow: hidden;
      }

      /* ═══ TIMELINE COLUMN ═══ */
      .timeline-col {
        flex: 1;
        overflow-y: auto;
        padding: 24px 30px 120px 80px;
        position: relative;
      }
      .timeline-col::-webkit-scrollbar {
        width: 6px;
      }
      .timeline-col::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 3px;
      }

      .timeline-line {
        position: absolute;
        left: 62px;
        top: 0;
        bottom: 0;
        width: 2px;
        background: #2a2a2a;
      }

      /* ═══ TIME SLOT ═══ */
      .slot {
        position: relative;
        padding: 14px 18px;
        margin-bottom: 6px;
        border-radius: 12px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-left: 4px solid #444;
        transition: all 0.2s;
        cursor: default;
      }
      .slot:hover {
        background: #222;
        border-color: #444;
        transform: translateX(2px);
      }
      .slot.current {
        background: rgba(0, 166, 81, 0.08);
        border-color: rgba(0, 166, 81, 0.3);
        border-left-color: var(--bcg-green);
        box-shadow: 0 0 20px rgba(0, 166, 81, 0.1);
      }
      .slot.current .slot-time-badge {
        background: var(--bcg-green);
        color: #fff;
      }
      .slot.done {
        opacity: 0.35;
      }
      .slot.done .slot-activity {
        text-decoration: line-through;
      }

      /* Time badge (left side) */
      .slot-time-badge {
        position: absolute;
        left: -62px;
        top: 14px;
        font-size: 10px;
        font-weight: 800;
        color: #888;
        background: #222;
        padding: 3px 6px;
        border-radius: 4px;
        width: 44px;
        text-align: center;
        letter-spacing: 0.3px;
      }

      /* Dot on timeline */
      .slot-dot {
        position: absolute;
        left: -23px;
        top: 18px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #444;
        border: 2px solid #1a1a1a;
        z-index: 2;
      }
      .slot.current .slot-dot {
        background: var(--bcg-green);
        box-shadow: 0 0 8px rgba(0, 166, 81, 0.5);
      }

      .slot-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .slot-time-range {
        font-size: 11px;
        color: #666;
        font-weight: 600;
        min-width: 90px;
      }
      .slot-activity {
        font-size: 13px;
        font-weight: 600;
        color: #e0e0e0;
        flex: 1;
      }
      .slot-duration {
        font-size: 10px;
        color: #555;
        background: #222;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 600;
      }

      .slot-detail {
        font-size: 11px;
        color: #777;
        margin-top: 4px;
        line-height: 1.5;
      }

      .slot-links {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }
      .slot-link {
        font-size: 10px;
        padding: 3px 10px;
        border-radius: 6px;
        background: rgba(0, 166, 81, 0.1);
        color: var(--bcg-green);
        text-decoration: none;
        font-weight: 600;
        border: 1px solid rgba(0, 166, 81, 0.2);
        transition: all 0.15s;
      }
      .slot-link:hover {
        background: rgba(0, 166, 81, 0.2);
        border-color: rgba(0, 166, 81, 0.4);
      }
      .open-all-btn {
        font-size: 10px;
        padding: 3px 10px;
        border-radius: 6px;
        background: var(--bcg-green);
        color: #fff;
        border: none;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .open-all-btn:hover {
        opacity: 0.8;
      }

      /* Check button */
      .slot-check {
        position: absolute;
        right: 14px;
        top: 14px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid #444;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: transparent;
        transition: all 0.15s;
      }
      .slot-check:hover {
        border-color: var(--bcg-green);
      }
      .slot-check.checked {
        background: var(--bcg-green);
        border-color: var(--bcg-green);
        color: #fff;
      }

      /* ═══ CATEGORY COLORS ═══ */
      .cat-video {
        border-left-color: #1976d2;
      }
      .cat-video .slot-dot {
        background: #1976d2;
      }
      .cat-drill {
        border-left-color: #e8a500;
      }
      .cat-drill .slot-dot {
        background: #e8a500;
      }
      .cat-practice {
        border-left-color: #00a651;
      }
      .cat-practice .slot-dot {
        background: #00a651;
      }
      .cat-solo {
        border-left-color: #7b1fa2;
      }
      .cat-solo .slot-dot {
        background: #7b1fa2;
      }
      .cat-fit {
        border-left-color: #d32f2f;
      }
      .cat-fit .slot-dot {
        background: #d32f2f;
      }
      .cat-break {
        border-left-color: #ff9800;
      }
      .cat-break .slot-dot {
        background: #ff9800;
      }
      .cat-meds {
        border-left-color: #e91e63;
      }
      .cat-meds .slot-dot {
        background: #e91e63;
      }

      /* ═══ SIDE PANEL (detail on click) ═══ */
      .detail-panel {
        width: 340px;
        background: #161616;
        border-left: 1px solid #2a2a2a;
        padding: 24px;
        overflow-y: auto;
        display: none;
      }
      .detail-panel.open {
        display: block;
      }
      .detail-panel h3 {
        font-size: 14px;
        color: #fff;
        margin-bottom: 16px;
        font-weight: 700;
      }
      .detail-panel .dp-time {
        font-size: 20px;
        font-weight: 800;
        color: var(--bcg-green);
        margin-bottom: 6px;
      }
      .detail-panel .dp-activity {
        font-size: 15px;
        font-weight: 600;
        color: #e0e0e0;
        margin-bottom: 12px;
        line-height: 1.5;
      }
      .detail-panel .dp-detail {
        font-size: 13px;
        color: #999;
        line-height: 1.7;
        margin-bottom: 16px;
      }
      .detail-panel .dp-links {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .detail-panel .dp-link {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: #1a1a1a;
        border-radius: 10px;
        border: 1px solid #2a2a2a;
        color: var(--bcg-green);
        text-decoration: none;
        font-size: 12px;
        font-weight: 600;
        transition: all 0.15s;
      }
      .detail-panel .dp-link:hover {
        background: #222;
        border-color: rgba(0, 166, 81, 0.3);
      }
      .detail-panel .dp-close {
        position: absolute;
        top: 12px;
        right: 12px;
        background: none;
        border: none;
        color: #666;
        font-size: 18px;
        cursor: pointer;
      }

      /* ═══ NOW PULSE ═══ */
      .now-marker {
        position: absolute;
        left: -30px;
        right: 0;
        height: 2px;
        background: var(--bcg-green);
        z-index: 10;
        pointer-events: none;
      }
      .now-marker::before {
        content: "NOW";
        position: absolute;
        left: -36px;
        top: -8px;
        font-size: 9px;
        font-weight: 800;
        color: var(--bcg-green);
        letter-spacing: 1px;
      }
      .now-marker::after {
        content: "";
        position: absolute;
        left: -6px;
        top: -5px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--bcg-green);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(0, 166, 81, 0.4);
        }
        50% {
          box-shadow: 0 0 0 8px rgba(0, 166, 81, 0);
        }
      }

      /* ═══ LEGEND ═══ */
      .legend {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 16px;
        background: #1a1a1a;
        border: 1px solid #333;
        padding: 8px 20px;
        border-radius: 30px;
        z-index: 50;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 10px;
        color: #888;
        font-weight: 600;
      }
      .legend-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      /* ═══ PROGRESS BAR ═══ */
      .progress-bar {
        position: fixed;
        top: 56px;
        left: 0;
        right: 0;
        height: 3px;
        background: #222;
        z-index: 100;
      }
      .progress-fill {
        height: 100%;
        background: var(--bcg-green);
        transition: width 0.5s ease;
        border-radius: 0 2px 2px 0;
      }

      /* ═══ DRAG & DROP ═══ */
      .slot[draggable="true"] {
        cursor: grab;
      }
      .slot[draggable="true"]:active {
        cursor: grabbing;
      }
      .slot.dragging {
        opacity: 0.4;
        transform: scale(0.97);
      }
      .slot.drag-over {
        border-top: 3px solid var(--bcg-green);
        margin-top: -3px;
        background: rgba(0, 166, 81, 0.05);
      }
      .slot .drag-handle {
        position: absolute;
        left: -8px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        color: #444;
        cursor: grab;
        opacity: 0;
        transition: opacity 0.15s;
        user-select: none;
      }
      .slot:hover .drag-handle {
        opacity: 1;
      }
      .slot.dragging .drag-handle {
        opacity: 0.3;
      }

      /* ═══ OVERLAP INDICATOR ═══ */
      .slot.overlap {
        border-color: #d32f2f !important;
        border-left-color: #d32f2f !important;
        background: rgba(211, 47, 47, 0.06);
      }
      .overlap-badge {
        position: absolute;
        top: 4px;
        right: 48px;
        font-size: 9px;
        font-weight: 800;
        color: #d32f2f;
        background: rgba(211, 47, 47, 0.15);
        padding: 2px 8px;
        border-radius: 6px;
        letter-spacing: 0.5px;
        animation: flash 2s infinite;
      }
      @keyframes flash {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      /* ═══ TIME EDITING ═══ */
      .slot-time-range.editable {
        cursor: pointer;
      }
      .slot-time-range.editable:hover {
        color: var(--bcg-green);
        text-decoration: underline;
        text-decoration-style: dashed;
      }
      .time-edit-container {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .time-edit-input {
        width: 48px;
        background: #111;
        border: 1px solid var(--bcg-green);
        color: #fff;
        font-size: 11px;
        font-weight: 600;
        padding: 2px 4px;
        border-radius: 4px;
        text-align: center;
        font-family: inherit;
      }
      .time-edit-input:focus {
        outline: none;
        box-shadow: 0 0 6px rgba(0, 166, 81, 0.4);
      }
      .time-edit-sep {
        color: #666;
        font-size: 11px;
      }
      .time-edit-ok {
        background: var(--bcg-green);
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 2px 8px;
        font-size: 10px;
        font-weight: 700;
        cursor: pointer;
      }
      .time-edit-cancel {
        background: #333;
        color: #888;
        border: none;
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 10px;
        cursor: pointer;
      }
    </style>
  </head>

      // ═══ SCHEDULE SYNC (shared with popup) ═══
      const SCHEDULE_KEY = "bcg-schedule-sync";

      function loadScheduleFromStorage() {
        try {
          const saved = JSON.parse(localStorage.getItem(SCHEDULE_KEY));
          if (!saved) return;
          for (const dayKey of DAY_ORDER) {
            if (saved[dayKey] && saved[dayKey].slots) {
              SCHEDULE[dayKey].slots = saved[dayKey].slots;
            }
          }
        } catch(e) { console.warn("Failed to load schedule:", e); }
      }

      function saveScheduleToStorage() {
        const data = {};
        for (const dayKey of DAY_ORDER) {
          data[dayKey] = { slots: SCHEDULE[dayKey].slots };
        }
        localStorage.setItem(SCHEDULE_KEY, JSON.stringify(data));
      }

      // Listen for changes from popup
      window.addEventListener("storage", (e) => {
        if (e.key === SCHEDULE_KEY) {
          loadScheduleFromStorage();
          renderTimeline();
        }
      });

      // Load any saved schedule modifications
      loadScheduleFromStorage();

      function getTodayKey() {
        const d = new Date();
        const day = d.getDate(),
          month = d.getMonth();
        if (month === 1) {
          if (day === 24) return "tue";
          if (day === 25) return "wed";
          if (day === 26) return "thu";
          if (day === 27) return "fri";
        }
        return "tue";
      }

      function parseTime(s) {
        const [h, m] = s.split(":").map(Number);
        return h * 60 + m;
      }

      function fmtMins(mins) {
        if (mins >= 60)
          return (
            Math.floor(mins / 60) +
            "h" +
            (mins % 60 ? String(mins % 60).padStart(2, "0") : "")
          );
        return mins + "min";
      }

      function categorize(text) {
        const t = text.toLowerCase();
        if (/💊|meds|propranolol|alprazolam|rubifen|concerta|aerius/.test(t))
          return "meds";
        if (/practice room|🤝/.test(t)) return "practice";
        if (/caso solo|📚/.test(t)) return "solo";
        if (/📹|course|sample interview|bloco/.test(t)) return "video";
        if (/drill|⚡/.test(t)) return "drill";
        if (/fit|scar/.test(t) && /📝/.test(t)) return "fit";
        if (
          /jantar|pausa|almoço|rest|nap|🍽️|😌|livre|relax|preparar|👔|duche|📖/.test(
            t,
          )
        )
          return "break";
        if (/🏆|interview|game/.test(t)) return "practice";
        return "default";
      }

        const d = document.createElement("div");
        d.textContent = t;

        const mins = Math.floor((diff % 3600000) / 60000);
        el.textContent = `⏱ ${days}d ${hours}h ${mins}m até à entrevista`;

      // ═══ DRAG & DROP ═══
      let dragSourceIdx = null;

      function slotDragStart(e, idx) {
        dragSourceIdx = idx;
        e.target.closest('.slot').classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', idx);
      }

      function slotDragOver(e, idx) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        // Clear all drag-over states
        document.querySelectorAll('.slot.drag-over').forEach(el => el.classList.remove('drag-over'));
        if (idx !== dragSourceIdx) {
          e.target.closest('.slot').classList.add('drag-over');
        }
      }

      function slotDrop(e, targetIdx) {
        e.preventDefault();
        document.querySelectorAll('.slot.drag-over').forEach(el => el.classList.remove('drag-over'));
        if (dragSourceIdx === null || dragSourceIdx === targetIdx) return;

        const day = SCHEDULE[currentDay];
        // Swap slots
        const temp = day.slots[dragSourceIdx];
        day.slots[dragSourceIdx] = day.slots[targetIdx];
        day.slots[targetIdx] = temp;

        saveScheduleToStorage();
        renderTimeline();
        dragSourceIdx = null;
      }

      function slotDragEnd(e) {
        document.querySelectorAll('.slot.dragging').forEach(el => el.classList.remove('dragging'));
        document.querySelectorAll('.slot.drag-over').forEach(el => el.classList.remove('drag-over'));
        dragSourceIdx = null;
      }

      // ═══ TIME EDITING ═══
      function startTimeEdit(idx) {
        const slot = SCHEDULE[currentDay].slots[idx];
        const slotEl = document.querySelectorAll('.slot')[idx];
        const timeEl = slotEl.querySelector('.slot-time-range');

        timeEl.innerHTML =
          '<div class="time-edit-container">' +
          `<input class="time-edit-input" type="time" value="${slot.start}" id="edit-start-${idx}">` +
          '<span class="time-edit-sep">–</span>' +
          `<input class="time-edit-input" type="time" value="${slot.end}" id="edit-end-${idx}">` +
          `<button class="time-edit-ok" onclick="event.stopPropagation(); saveTimeEdit(${idx})">✓</button>` +
          `<button class="time-edit-cancel" onclick="event.stopPropagation(); renderTimeline()">✕</button>` +
          '</div>';

        const startInput = document.getElementById(`edit-start-${idx}`);
        startInput.focus();

        // Enter to save, Escape to cancel
        const handler = (e) => {
          if (e.key === 'Enter') saveTimeEdit(idx);
          if (e.key === 'Escape') renderTimeline();
        };
        startInput.addEventListener('keydown', handler);
        document.getElementById(`edit-end-${idx}`).addEventListener('keydown', handler);
      }

        const endVal = document.getElementById(`edit-end-${idx}`).value;

        if (!startVal || !endVal) { renderTimeline(); return; }

        const slot = SCHEDULE[currentDay].slots[idx];
        slot.start = startVal;
        slot.end = endVal;

        saveScheduleToStorage();
        renderTimeline();
      }

      // ═══ OVERLAP DETECTION ═══
      function detectOverlaps(slots) {
        const overlapping = new Set();
        for (let i = 0; i < slots.length; i++) {
          const si = parseTime(slots[i].start);
          let ei = parseTime(slots[i].end);
          if (ei <= si) ei += 24 * 60; // overnight

          for (let j = i + 1; j < slots.length; j++) {
            const sj = parseTime(slots[j].start);
            let ej = parseTime(slots[j].end);
            if (ej <= sj) ej += 24 * 60;

            // Two intervals overlap if one starts before the other ends
            if (si < ej && sj < ei) {
              overlapping.add(i);
              overlapping.add(j);
            }
          }
        }
        return overlapping;
      }

      // Pop Out as always-on-top floating window (original)
      async function popOut() {
      function closeDetail() {
        document.getElementById("detail-panel").classList.remove("open");
      }

      function openAllFromDetail() {
        const panel = document.getElementById("detail-panel");
        if (panel._links) {
          panel._links.forEach((l) => window.open(l.href, "_blank"));
        }
      }

      // ═══ CHECK TOGGLE ═══
      function toggleCheck(key, btn, idx) {
        checks[key] = !checks[key];
        localStorage.setItem("tl-checks", JSON.stringify(checks));
        renderTimeline();
      }

      // ═══ OPEN ALL LINKS ═══
      function openAll(btn) {
        const slot = btn.closest(".slot");
        slot
          .querySelectorAll(".slot-link")
          .forEach((a) => window.open(a.href, "_blank"));
      }

      // ═══ INIT ═══
      updateCountdown();
      setInterval(updateCountdown, 60000);
      renderTabs();
      renderTimeline();

      // Auto-refresh timeline every minute
      setInterval(() => renderTimeline(), 60000);

      // Keyboard: left/right to switch days
      document.addEventListener("keydown", (e) => {
        const idx = DAY_ORDER.indexOf(currentDay);
        if (e.key === "ArrowLeft" && idx > 0) {
          currentDay = DAY_ORDER[idx - 1];
          renderTabs();
          renderTimeline();
        } else if (e.key === "ArrowRight" && idx < DAY_ORDER.length - 1) {
          currentDay = DAY_ORDER[idx + 1];
          renderTabs();
          renderTimeline();
        }
      });

      // Pop Out as always-on-top floating window
      async function popOut() {
        if ("documentPictureInPicture" in window) {
          try {
            const pipWindow = await documentPictureInPicture.requestWindow({
              width: 380,
              height: 640,
            });
            const resp = await fetch("popup.html");
            const html = await resp.text();
            pipWindow.document.open();
            pipWindow.document.write(html);
            pipWindow.document.close();
            return;
          } catch (err) {
            console.warn("PiP failed:", err);
          }
        }
        const w = 380,
          h = 640;
        const left = screen.width - w - 30;
        const top = 60;
        const features =
          "width=" +
          w +
          ",height=" +
          h +
          ",left=" +
          left +
          ",top=" +
          top +
          ",resizable=yes,scrollbars=yes,toolbar=no,menubar=no,location=no,status=no";
        window.open("popup.html", "bcg-schedule-popup", features);
      }
    </script>
  </body>
